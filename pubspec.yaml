name: g_route_app
description: A new Flutter project for Next-Gen Travel.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.7.0
  rive: ^0.13.10
  cupertino_icons: ^1.0.6
  google_maps_flutter: ^2.6.0
  supabase_flutter: ^2.5.0
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  mapbox_maps_flutter: ^2.5.1
  http: ^1.2.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  google_generative_ai: ^0.4.3
  screenshot: ^3.0.0
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  lottie: ^3.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/Logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#000000"
  image: "assets/Logo.png"
  android: true
  ios: true
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/Logo.png
